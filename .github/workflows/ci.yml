name: CI Pipeline

on:
  push:
    branches: main

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [25.5.0]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{matrix.node-version}}
          cache: "npm"
          cache-dependency-path: my-blog-api/package-lock.json

      - name: Install dependencies
        run: |
          cd my-blog-api
          npm ci

      - name: Generate Prisma Client
        run: |
          cd my-blog-api
          npx prisma generate

      - name: Run Tests
        run: |
          cd my-blog-api
          npx jest --config jest.config.ts

      - name: Discord Notification
        if: always()
        run: |
          # Tentukan warna berdasarkan status job (Green untuk sukses, Red untuk gagal)
          if [ "${{ job.status }}" = "success" ]; then
            COLOR=2664261  # Desimal dari #28A745
          else
            COLOR=14431557 # Desimal dari #DC3545
          fi

          # Kirim payload JSON ke Discord menggunakan cURL
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "embeds": [{
                   "title": "CI Pipeline Build Status",
                   "description": "Repository: ${{ github.repository }}\nCommit: ${{ github.event.head_commit.message }}\nAuthor: ${{ github.actor }}",
                   "color": '$COLOR'
                 }]
               }' \
               "${{ secrets.DISCORD_WEBHOOK }}"

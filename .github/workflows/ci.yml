name: CI Pipeline

on:
  push:
    branches: main

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [25.5.0]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{matrix.node-version}}
          cache: "npm"
          cache-dependency-path: my-blog-api/package-lock.json

      - name: Install dependencies
        run: |
          cd my-blog-api
          npm ci

      - name: Generate Prisma Client
        run: |
          cd my-blog-api
          npx prisma generate

      - name: Run Tests
        run: |
          cd my-blog-api
          npx jest --config jest.config.ts

      - name: Discord Notification
        uses: sandro-g/discord-webhook-action@v2
        if: always()
        with:
          webhook-url: ${{secrets.DISCORD_WEBHOOK}}
          title: "CI Pipeline Build Status"
          description: "Repository; ${{ github.repository }} \nCommit: ${{ github.event.head_commit.message }} \nAuthor: ${{ github.actor }}"
          color: ${{ job.status == 'success' && '#28a745' || '#dc3545' }}

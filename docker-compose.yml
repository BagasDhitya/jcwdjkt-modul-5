services:
  my-blog:
    build:
      context: ./my-blog
      dockerfile: Dockerfile
    container_name: my-blog
    ports:
      - "3000:3000"
    depends_on:
      - my-blog-api
    networks:
      - blog-network

  my-blog-api:
    build:
      context: ./my-blog-api
      dockerfile: Dockerfile
    container_name: my-blog-api
    ports:
      - "8000:8000"
    env_file:
      - ./my-blog-api/.env
    networks:
      - blog-network

  # === tambahkan owasp zap di akhir === #
  owasp-zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: owasp-zap
    volumes:
      - ./zap-reports:/zap/wrk:rw
    command: zap-baseline.py -t http://my-blog:3000 -r report.html
    depends_on:
      - my-blog
    networks:
      - blog-network
    profiles:
      - dast-scan

networks:
  blog-network:
    driver: bridge

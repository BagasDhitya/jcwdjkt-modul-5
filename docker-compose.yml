services:
  my-blog:
    build:
      context: ./my-blog
      dockerfile: Dockerfile
    container_name: my-blog
    ports:
      - "3000:3000"
    depends_on:
      - my-blog-api
    networks:
      - blog-network

  my-blog-api:
    build:
      context: ./my-blog-api
      dockerfile: Dockerfile
    container_name: my-blog-api
    ports:
      - "8000:8000"
    env_file:
      - ./my-blog-api/.env
    networks:
      - blog-network

networks:
  blog-network:
    driver: bridge